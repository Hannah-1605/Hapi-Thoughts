{% extends 'base.html' %}

{% block title %}Forgot Password — Hapi Vet{% endblock %}

{% block content %}
<!-- Forgot password page — user enters their email -->
<div class="login-page">
  <div class="login-card">

    <div class="login-header">
      <h1 class="clinic-name">Hapi Vet</h1>
      <p class="clinic-tagline">Reset your password</p>
    </div>

    <p>Enter your email address and we'll send you a link to reset your password.</p>

    <form method="POST" action="{% url 'forgot_password' %}">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_email">Email Address</label>
        <input
          type="email"
          id="id_email"
          name="email"
          placeholder="you@email.com"
          required
          autofocus
        />
      </div>

      <button type="submit" class="btn-primary">
        Send Reset Link
      </button>

    </form>

    <div class="login-links">
      <a href="{% url 'owner_login' %}">← Back to login</a>
    </div>

  </div>
</div>
{% endblock %}
