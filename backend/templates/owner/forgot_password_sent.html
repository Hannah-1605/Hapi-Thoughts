{% extends 'base.html' %}

{% block title %}Check Your Email — Hapi Vet{% endblock %}

{% block content %}
<!-- Shown after forgot password form is submitted -->
<div class="login-page">
  <div class="login-card">
    <h1>Check your email</h1>
    <p>
      If an account exists with that email address, we've sent a
      password reset link. Please check your inbox.
    </p>
    <p>
      <a href="{% url 'owner_login' %}">← Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
